<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>{{ title or "Meu Sistema" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <!-- Icons: Iconify CDN for standard Lucide & Logos -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <script>
        // Prevenir FOUC (Flash of Unstyled Content) configurando o tema antes de renderizar a DOM
        let t = localStorage.getItem('hybrid-theme') || 'system';
        if (t === 'light' || (t === 'system' && window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>

<body class="noise-bg font-sans min-h-screen relative overflow-x-hidden">
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col justify-end pointer-events-none">
    </div>
    <script id="flash-messages" type="application/json">
        {{ get_flashed_messages(with_categories=true) | tojson }}
    </script>
    <script>
        window.showToast = window.showToast || function (title, message, type = 'success', duration = 4000) {
            const container = document.getElementById('toast-container');

            if (!container) {
                return;
            }

            const toastTypes = {
                success: {
                    icon: 'lucide:check-circle-2',
                    color: 'text-emerald-400',
                    bg: 'bg-emerald-500/10',
                    border: 'border-emerald-500/20',
                    progress: 'bg-emerald-500',
                },
                error: {
                    icon: 'lucide:alert-circle',
                    color: 'text-red-400',
                    bg: 'bg-red-500/10',
                    border: 'border-red-500/20',
                    progress: 'bg-red-500',
                },
                warning: {
                    icon: 'lucide:triangle-alert',
                    color: 'text-amber-400',
                    bg: 'bg-amber-500/10',
                    border: 'border-amber-500/20',
                    progress: 'bg-amber-500',
                },
                info: {
                    icon: 'lucide:info',
                    color: 'text-sky-400',
                    bg: 'bg-sky-500/10',
                    border: 'border-sky-500/20',
                    progress: 'bg-sky-500',
                },
            };

            const style = toastTypes[type] || toastTypes.info;
            const toast = document.createElement('div');
            toast.className = 'glass-panel pointer-events-auto w-80 rounded-2xl overflow-hidden shadow-2xl border transition-all duration-300 transform translate-y-8 opacity-0 flex flex-col mt-3 bg-slate-900/95';
            toast.innerHTML = `
                <div class="p-4 flex items-start gap-3 bg-white/[0.02]">
                    <div class="w-8 h-8 rounded-full ${style.bg} ${style.border} border flex items-center justify-center shrink-0 ${style.color}">
                        <iconify-icon icon="${style.icon}" width="16"></iconify-icon>
                    </div>
                    <div class="flex-1 min-w-0 pt-1">
                        <h4 class="text-sm font-medium text-white"></h4>
                        <p class="text-xs text-white/60 mt-0.5 leading-relaxed"></p>
                    </div>
                    <button class="w-6 h-6 flex items-center justify-center text-white/40 hover:text-white transition-colors shrink-0" type="button">
                        <iconify-icon icon="lucide:x" width="14"></iconify-icon>
                    </button>
                </div>
                <div class="h-1 w-full bg-black/20">
                    <div class="h-full ${style.progress} transition-all duration-100 ease-linear origin-left" style="width: 100%"></div>
                </div>
            `;

            toast.querySelector('h4').textContent = title;
            toast.querySelector('p').textContent = message;
            toast.querySelector('button').addEventListener('click', () => toast.remove());

            container.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-8', 'opacity-0');
            });

            const progressBar = toast.querySelector('.h-full.transition-all');
            const startTime = Date.now();

            function updateProgress() {
                const elapsed = Date.now() - startTime;
                const progress = Math.max(0, 100 - (elapsed / duration) * 100);
                progressBar.style.width = `${progress}%`;

                if (progress > 0) {
                    requestAnimationFrame(updateProgress);
                }
            }

            requestAnimationFrame(updateProgress);

            window.setTimeout(() => {
                toast.classList.add('translate-y-8', 'opacity-0');
                window.setTimeout(() => toast.remove(), 300);
            }, duration);
        };
    </script>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const flashEl = document.getElementById('flash-messages');
            const messages = flashEl ? JSON.parse(flashEl.textContent || '[]') : [];

            if (!messages.length || typeof window.showToast !== 'function') {
                return;
            }

            const flashTitles = {
                success: 'Sucesso',
                error: 'Erro',
                info: 'Informação',
                warning: 'Atenção',
            };

            messages.forEach(([category, message]) => {
                window.showToast(flashTitles[category] || 'Informação', message, category);
            });
        });
    </script>
</body>

</html>
