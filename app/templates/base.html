<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{{ title or "Meu Sistema" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <!-- Icons: Iconify CDN for standard Lucide & Logos -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <script>
        // Prevenir FOUC (Flash of Unstyled Content) configurando o tema antes de renderizar a DOM
        let t = localStorage.getItem('hybrid-theme') || 'system';
        if (t === 'light' || (t === 'system' && window.matchMedia && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'light');
        }
    </script>
</head>
<body class="noise-bg font-sans min-h-screen relative overflow-x-hidden">
    <div class="fixed top-4 left-1/2 z-[120] w-full max-w-md -translate-x-1/2 px-4 pointer-events-none">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="space-y-3">
            {% for category, message in messages %}
            <div class="pointer-events-auto rounded-xl border px-4 py-3 shadow-lg backdrop-blur-md {{ 'border-red-500/30 bg-red-500/10 text-red-100' if category == 'error' else 'border-sky-500/30 bg-sky-500/10 text-sky-100' }}">
                <div class="flex items-start gap-3">
                    <div class="mt-0.5 text-sm font-semibold uppercase tracking-wide">{{ category }}</div>
                    <div class="text-sm leading-relaxed">{{ message }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
    </div>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
